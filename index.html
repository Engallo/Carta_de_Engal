
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap');

  body { background: transparent; }

  .page {
    min-height: 600px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #ffe4ec 0%, #ffd6e7 50%, #ffcce3 100%);
    border-radius: 16px;
  }

  .hearts-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .h-float {
    position: absolute;
    opacity: 0.3;
    animation: floatHeart 6s ease-in-out infinite;
  }

  @keyframes floatHeart {
    0%, 100% { transform: translateY(0px) rotate(-10deg); }
    50% { transform: translateY(-18px) rotate(10deg); }
  }

  .step { display: none; width: 100%; max-width: 480px; text-align: center; }
  .step.active { display: flex; flex-direction: column; align-items: center; animation: fadeIn 0.6s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .big-heart {
    width: 64px; height: 64px; margin-bottom: 20px;
  }

  .title {
    font-family: 'Caveat', cursive;
    font-size: 42px;
    color: #c0336e;
    margin-bottom: 10px;
    line-height: 1.1;
  }

  .subtitle {
    font-size: 15px;
    color: #9e5070;
    margin-bottom: 32px;
  }

  .envelope-wrap {
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .envelope {
    width: 160px;
    height: 110px;
    position: relative;
    transition: transform 0.2s ease;
  }
  .envelope:hover { transform: scale(1.05); }

  .env-body {
    width: 160px;
    height: 110px;
    background: #f4a0c0;
    border-radius: 6px;
    position: absolute;
    bottom: 0;
  }

  .env-flap {
    width: 0;
    height: 0;
    border-left: 80px solid transparent;
    border-right: 80px solid transparent;
    border-top: 56px solid #e87aaa;
    position: absolute;
    top: 0;
    left: 0;
  }

  .env-heart {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    z-index: 2;
  }

  .tap-hint {
    font-size: 13px;
    color: #b06080;
  }

  .arrow-down {
    margin-top: 24px;
    color: #c0336e;
    font-size: 22px;
    animation: bounce 1.5s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(6px); }
  }

  .card-letter {
    background: white;
    border-radius: 4px;
    padding: 36px 32px 28px;
    width: 100%;
    max-width: 360px;
    position: relative;
    box-shadow: 0 2px 12px rgba(180,80,120,0.10);
    border-left: 4px solid #f4b8cc;
  }

  .card-lines {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    border-radius: 4px;
    overflow: hidden;
  }

  .tape {
    width: 56px;
    height: 20px;
    background: rgba(200,200,200,0.45);
    border-radius: 2px;
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
  }

  .letter-text {
    font-family: 'Caveat', cursive;
    font-size: 20px;
    color: #444;
    line-height: 1.9;
    text-align: center;
  }

  .letter-footer {
    margin-top: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: 'Caveat', cursive;
    font-size: 20px;
    color: #c0336e;
  }

  .btn-next {
    margin-top: 28px;
    background: #e8607a;
    color: white;
    border: none;
    border-radius: 100px;
    padding: 12px 32px;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    font-family: inherit;
  }
  .btn-next:hover { background: #c0336e; transform: scale(1.04); }

  svg.heart-icon { display: inline-block; vertical-align: middle; }
</style>

<div class="page">
  <div class="hearts-bg">
    <svg class="h-float" style="top:6%;left:8%;width:22px;animation-delay:0s" viewBox="0 0 24 24"><path fill="#e87aaa" d="M12 21.6C5.4 17.4 1 13.2 1 8.5A5.5 5.5 0 0 1 12 5.1 5.5 5.5 0 0 1 23 8.5c0 4.7-4.4 8.9-11 13.1z"/></svg>
    <svg class="h-float" style="top:10%;left:82%;width:16px;animation-delay:1s" viewBox="0 0 24 24"><path fill="#f4a0c0" d="M12 21.6C5.4 17.4 1 13.2 1 8.5A5.5 5.5 0 0 1 12 5.1 5.5 5.5 0 0 1 23 8.5c0 4.7-4.4 8.9-11 13.1z"/></svg>
    <svg class="h-float" style="top:25%;left:3%;width:12px;animation-delay:2s" viewBox="0 0 24 24"><path fill="#e87aaa" d="M12 21.6C5.4 17.4 1 13.2 1 8.5A5.5 5.5 0 0 1 12 5.1 5.5 5.5 0 0 1 23 8.5c0 4.7-4.4 8.9-11 13.1z"/></svg>
    <svg class="h-float" style="top:20%;left:90%;width:20px;animation-delay:0.5s" viewBox="0 0 24 24"><path fill="#f4a0c0" d="M12 21.6C5.4 17.4 1 13.2 1 8.5A5.5 5.5 0 0 1 12 5.1 5.5 5.5 0 0 1 23 8.5c0 4.7-4.4 8.9-11 13.1z"/></svg>
    <svg class="h-float" style="top:70%;left:5%;width:18px;animation-delay:1.5s" viewBox="0 0 24 24"><path fill="#e87aaa" d="M12 21.6C5.4 17.4 1 13.2 1 8.5A5.5 5.5 0 0 1 12 5.1 5.5 5.5 0 0 1 23 8.5c0 4.7-4.4 8.9-11 13.1z"/></svg>
    <svg class="h-float" style="top:75%;left:88%;width:14px;animation-delay:2.5s" viewBox="0 0 24 24"><path fill="#f4a0c0" d="M12 21.6C5.4 17.4 1 13.2 1 8.5A5.5 5.5 0 0 1 12 5.1 5.5 5.5 0 0 1 23 8.5c0 4.7-4.4 8.9-11 13.1z"/></svg>
    <svg class="h-float" style="top:88%;left:40%;width:10px;animation-delay:3s" viewBox="0 0 24 24"><path fill="#e87aaa" d="M12 21.6C5.4 17.4 1 13.2 1 8.5A5.5 5.5 0 0 1 12 5.1 5.5 5.5 0 0 1 23 8.5c0 4.7-4.4 8.9-11 13.1z"/></svg>
  </div>

  <!-- PASO 1 -->
  <div class="step active" id="step1">
    <svg class="big-heart" viewBox="0 0 64 64">
      <path fill="#e8607a" d="M32 56C14 44 4 34 4 22a14 14 0 0 1 28-3 14 14 0 0 1 28 3c0 12-10 22-28 34z"/>
    </svg>
    <div class="title">Hola amor...</div>
    <div class="subtitle">Tengo un mensaje muy especial para ti.</div>

    <div class="envelope-wrap" onclick="goStep2()">
      <div class="envelope">
        <div class="env-body"></div>
        <div class="env-flap"></div>
        <div class="env-heart">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#e8607a" d="M12 21.6C5.4 17.4 1 13.2 1 8.5A5.5 5.5 0 0 1 12 5.1 5.5 5.5 0 0 1 23 8.5c0 4.7-4.4 8.9-11 13.1z"/></svg>
        </div>
      </div>
      <div class="tap-hint">Toca para abrir ✨</div>
    </div>

    <div class="arrow-down">⌄</div>
  </div>

  <!-- PASO 2 -->
  <div class="step" id="step2">
    <div class="card-letter">
      <div class="tape"></div>
      <svg style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;border-radius:4px" viewBox="0 0 360 320" preserveAspectRatio="none">
        <line x1="52" y1="52" x2="340" y2="52" stroke="#fce4ec" stroke-width="1"/>
        <line x1="52" y1="71" x2="340" y2="71" stroke="#fce4ec" stroke-width="1"/>
        <line x1="52" y1="90" x2="340" y2="90" stroke="#fce4ec" stroke-width="1"/>
        <line x1="52" y1="109" x2="340" y2="109" stroke="#fce4ec" stroke-width="1"/>
        <line x1="52" y1="128" x2="340" y2="128" stroke="#fce4ec" stroke-width="1"/>
        <line x1="52" y1="147" x2="340" y2="147" stroke="#fce4ec" stroke-width="1"/>
        <line x1="52" y1="166" x2="340" y2="166" stroke="#fce4ec" stroke-width="1"/>
        <line x1="52" y1="185" x2="340" y2="185" stroke="#fce4ec" stroke-width="1"/>
        <line x1="52" y1="204" x2="340" y2="204" stroke="#fce4ec" stroke-width="1"/>
        <line x1="52" y1="223" x2="340" y2="223" stroke="#fce4ec" stroke-width="1"/>
        <line x1="52" y1="242" x2="340" y2="242" stroke="#fce4ec" stroke-width="1"/>
        <line x1="52" y1="261" x2="340" y2="261" stroke="#fce4ec" stroke-width="1"/>
        <line x1="52" y1="280" x2="340" y2="280" stroke="#fce4ec" stroke-width="1"/>
        <line x1="52" y1="299" x2="340" y2="299" stroke="#fce4ec" stroke-width="1"/>
      </svg>

      <div class="letter-text">
        Tu sonrisa es mi luz,<br>
        tus ojos mi destino.<br><br>
        No quiero nada más,<br>
        que caminar contigo.<br><br>
        Eres mi persona favorita,<br>
        hoy y siempre.
      </div>

      <div class="letter-footer">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#e8607a" d="M12 21.6C5.4 17.4 1 13.2 1 8.5A5.5 5.5 0 0 1 12 5.1 5.5 5.5 0 0 1 23 8.5c0 4.7-4.4 8.9-11 13.1z"/></svg>
        Engal
      </div>
    </div>
  </div>
</div>

<script>
  function goStep2() {
    document.getElementById('step1').classList.remove('active');
    document.getElementById('step2').classList.add('active');
  }
</script>
